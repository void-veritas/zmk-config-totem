include:
  # ── Classic setup (no dongle, left is central) ──────────────────────────
  - board: xiao_ble//zmk
    shield: totem_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: classic-left

  - board: xiao_ble//zmk
    shield: totem_right
    artifact-name: classic-right

  # ── Dongle setup (Prospector is central) ────────────────────────────────
  - board: xiao_ble//zmk
    shield: totem_dongle prospector_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: dongle-central

  - board: xiao_ble//zmk
    shield: totem_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: dongle-left

  - board: xiao_ble//zmk
    shield: totem_right
    artifact-name: dongle-right

  # ── Utility ─────────────────────────────────────────────────────────────
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings-reset
